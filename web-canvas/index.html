<!DOCTYPE html>
<!-- imp/web-canvas/index.html
     Derived from: dsr/imp/web-canvas.dsr (entry)
     IMP stage source of truth: ds/dsr/imp/web-canvas.dsr. -->
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fish Eat Fish — Domain Sense demo</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" type="image/svg+xml" href="./assets/fish2.svg">
</head>
<body>
    <canvas id="game"></canvas>
    <div id="join" hidden>
        <!-- @ds:34ba255b -->
        <form id="join-form">
            <div class="join-header" aria-hidden="true">
                <div class="join-bait">
                    <img src="./src/selfish-bait.svg" alt="">
                </div>
                <div>
                    <strong>Selfish bait</strong>
                    <span>Fish Death Race</span>
                </div>
            </div>
            <label>
                <span>Name</span>
                <input id="join-name" type="text" maxlength="24" autocomplete="off">
            </label>
            <label>
                <span>Color</span>
                <input id="join-color" type="color">
            </label>
            <label class="toggle">
                <input id="join-tier" type="checkbox">
                <span>paid fish</span>
            </label>
            <button type="submit">Dive away!</button>
        </form>
    </div>
    <div id="hud">
        <div class="hud-row">
            <button id="game-menu-toggle" type="button" aria-label="Menu" aria-controls="game-menu" aria-expanded="false"><span></span><span></span><span></span></button>
            <div id="user-fish-metrics" aria-label="user fish metrics">
                <span id="eaten-metric"><span>eaten:</span> <strong id="eaten">0</strong></span>
            </div>
            <button id="debug-mode-toggle" type="button" aria-pressed="false">Debug</button>
        </div>
    </div>
    <!-- @ds:ab1e4f02 -->
    <aside id="game-menu" hidden>
        <div id="control-modes" class="menu-row" hidden>
            <button type="button" data-control-mode="joystick">Джойстик</button>
            <button type="button" data-control-mode="pointer">Мышь</button>
            <button type="button" data-control-mode="touch">Тач</button>
        </div>
        <div class="menu-row menu-meta">
            <span id="app-version">version: loading</span>
            <span id="status">alive</span>
            <button id="leave-game" type="button" hidden>Выйти</button>
        </div>
        <!-- @ds:e001d967 -->
        <label id="viewport-fish-capacity" class="menu-row menu-setting">
            <span>Обзор</span>
            <select id="viewport-fish-capacity-select" aria-label="canvas fish capacity">
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="30">30</option>
                <option value="max">max</option>
            </select>
        </label>
        <!-- @ds:cff27cd5 -->
        <section id="burst-endurance-panel" aria-label="burst endurance table">
            <table id="burst-endurance-table">
                <thead>
                    <tr><th>v</th><th>mode</th><th>size</th><th>factor</th><th>loss</th><th>now</th></tr>
                </thead>
                <tbody id="burst-endurance-rows"></tbody>
            </table>
        </section>
        <p id="control-help" hidden></p>
    </aside>
    <!-- @ds:2e91f6d4 @ds:b9136c2e @ds:c5a92431 -->
    <div id="player-metrics" aria-label="player metrics" hidden>
        <span id="player-life">
            <strong id="player-name">-</strong>
            <span id="lifetime" aria-label="life time"><span id="lifetime-bar"></span></span>
        </span>
        <span id="player-size"><span id="player-size-label">size</span><strong id="player-size-value">-</strong></span>
    </div>
    <!-- @ds:e42a7c19 -->
    <div id="world-info" aria-label="world snapshot info">
        <span class="world-info-item"><span>fish</span><strong id="world-fish-count">0</strong></span>
        <span class="world-info-item"><span>area</span><em id="world-fish-area">0</em></span>
        <span class="world-info-item"><span>nutrients</span><strong id="world-nutrient-count">0</strong></span>
        <span class="world-info-item"><span>area</span><em id="world-nutrient-area">0</em></span>
        <span id="world-speed-info" class="world-info-item"><span>speed</span><strong id="player-speed-real">0.00</strong></span>
    </div>
    <div id="joystick-panel" hidden>
        <div id="joystick-base" aria-label="joystick">
            <div id="joystick-burst-rings"></div>
            <div id="joystick-current-burst-ring"></div>
            <!-- @ds:c656f0ec -->
            <div id="player-speed-metric" aria-label="player relative speed" aria-hidden="true">
                <strong id="player-speed-percent">0</strong>
            </div>
            <div id="joystick-knob"></div>
        </div>
    </div>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
